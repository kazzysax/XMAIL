<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XMAIL — Dashboard</title>
<link rel="icon" type="image/x-icon" href="assets/favicon.ico?v=4">
<link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32.png?v=4">
<link rel="icon" type="image/png" sizes="192x192" href="assets/favicon-192.png?v=4">
<link rel="apple-touch-icon" href="assets/apple-touch-icon.png?v=4">
<link rel="preconnect" href="https://api.fontshare.com">
<link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700,900&display=swap" rel="stylesheet">
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap');
:root{
  --ink:#000000;--ink-2:#0B0B0B;--ink-3:#141414;--line:#242424;--line-2:#333333;
  --paper:#F7F5F1;--muted:#8C8C8C;--muted-2:#5C5C5C;
  --amber:#FF6B2C;--amber-soft:#2B180D;--teal:#39B27D;--teal-soft:#0F2119;
  --red:#E5645C;--red-soft:#301412;--radius:11px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:
    linear-gradient(90deg,rgba(255,255,255,.03) 1px,transparent 1px) 0 0/56px 56px,
    linear-gradient(0deg,rgba(255,255,255,.03) 1px,transparent 1px) 0 0/56px 56px,
    var(--ink);
  color:var(--paper);font-family:'Satoshi','Inter',-apple-system,system-ui,sans-serif;font-size:14.5px;line-height:1.5;-webkit-font-smoothing:antialiased;letter-spacing:-.01em}
.mono{font-family:'JetBrains Mono',monospace;letter-spacing:0}
a{color:inherit;text-decoration:none}
button{font-family:inherit;cursor:pointer}
.topbar{position:sticky;top:0;z-index:40;background:rgba(0,0,0,.9);backdrop-filter:blur(18px) saturate(1.15);border-bottom:1px solid var(--line)}
.topbar-inner{max-width:1220px;margin:0 auto;padding:0 24px;height:62px;display:flex;align-items:center;gap:16px}
.brand{display:flex;align-items:center;gap:10px;font-weight:900;font-size:18px;letter-spacing:.04em}
.logo{width:36px;height:36px;flex-shrink:0;display:grid;place-items:center;border-radius:9px;overflow:hidden;background:#0a0a0a;border:1px solid rgba(255,107,44,.22);box-shadow:0 6px 18px -6px rgba(232,90,27,.55)}
.logo img{width:100%;height:100%;object-fit:cover;display:block;transform:scale(1.06)}
.top-right{margin-left:auto;display:flex;align-items:center;gap:9px}
.conn{display:flex;align-items:center;gap:7px;background:var(--ink-2);border:1px solid var(--line);border-radius:8px;padding:6px 11px;font-size:12px;font-weight:500;transition:border-color .2s}
.conn .dot{width:7px;height:7px;border-radius:50%}
.conn.on .dot{background:var(--teal);box-shadow:0 0 7px var(--teal)}
.conn.off .dot{background:var(--muted-2)}
.conn.off{color:var(--muted)}
@media(max-width:760px){.conn .label{display:none}}
.acct{position:relative}
.acct-btn{display:flex;align-items:center;gap:8px;background:var(--ink-2);border:1px solid var(--line);border-radius:8px;padding:5px 11px 5px 5px;font-size:12.5px;color:var(--paper)}
.acct-btn:hover{border-color:var(--line-2)}
.avatar{width:26px;height:26px;border-radius:6px;background:var(--ink-3);border:1px solid var(--line);display:grid;place-items:center;font-weight:700;font-size:12px;color:var(--amber)}
.acct-menu{position:absolute;right:0;top:44px;width:248px;background:var(--ink-2);border:1px solid var(--line-2);border-radius:11px;padding:7px;box-shadow:0 24px 50px -20px rgba(0,0,0,.85);display:none}
.acct-menu.open{display:block}
.acct-head{padding:11px;border-bottom:1px solid var(--line);margin-bottom:5px}
.acct-head .em{font-size:13px;font-weight:700}
.acct-head .sub{font-size:11.5px;color:var(--muted-2);margin-top:2px}
.acct-menu a,.acct-menu button{display:flex;align-items:center;gap:10px;padding:9px 11px;border-radius:7px;font-size:13px;color:var(--muted);width:100%;background:none;border:none;text-align:left}
.acct-menu a:hover,.acct-menu button:hover{background:var(--ink-3);color:var(--paper)}
.shell{max-width:1220px;margin:0 auto;padding:22px 24px 60px;display:flex;gap:20px;align-items:flex-start}
.main{flex:1;min-width:0}
.sidebar{width:260px;flex-shrink:0;display:flex;flex-direction:column;gap:12px;position:sticky;top:84px}
@media(max-width:900px){.shell{flex-direction:column}.sidebar{width:100%;position:static}}
.bar{background:linear-gradient(180deg,rgba(16,16,16,.98),var(--ink-2));border:1px solid var(--line);border-radius:10px;overflow:hidden;transition:border-color .2s}
.bar:hover{border-color:var(--line-2)}
.bar-head{display:flex;align-items:center;gap:10px;padding:12px 15px;cursor:pointer;user-select:none}
.bar-head h4{font-weight:700;font-size:13.5px}
.bar-head .cnt{margin-left:auto;font-family:'JetBrains Mono';font-size:11px;color:var(--muted-2);background:var(--ink);border:1px solid var(--line);padding:1px 8px;border-radius:20px}
.bar-head .chev-b{font-size:11px;color:var(--muted-2);transition:transform .25s}
.bar.open .chev-b{transform:rotate(180deg)}
.bar-body{max-height:0;overflow:hidden;transition:max-height .3s ease}
.bar.open .bar-body{max-height:420px}
.bar-body-inner{padding:0 15px 15px}
.mini-row{display:flex;gap:6px;margin-bottom:9px;flex-wrap:wrap}
.mini-row select,.mini-row input{background:var(--ink);border:1px solid var(--line);color:var(--paper);border-radius:7px;padding:8px 9px;font-family:'Satoshi';font-size:12px}
.mini-row input{flex:1;min-width:70px}
.mini-add{background:var(--ink-3);border:1px solid var(--line);color:var(--paper);border-radius:7px;padding:0 12px;font-size:16px;font-weight:600}
.chip{display:flex;align-items:center;gap:8px;background:var(--ink);border:1px solid var(--line);border-radius:7px;padding:7px 10px;font-size:12px;margin-bottom:6px}
.chip .x{margin-left:auto;color:var(--muted-2);cursor:pointer;background:none;border:none}
.pill{font-family:'JetBrains Mono';font-size:9px;letter-spacing:.04em;text-transform:uppercase;padding:2px 7px;border-radius:4px;font-weight:500}
.pill.high{background:var(--amber-soft);color:var(--amber)}
.pill.normal,.pill.med{background:#2a2a16;color:#c9c05a}
.pill.low{background:var(--ink-3);color:var(--muted)}
.tmpl{background:var(--ink);border:1px solid var(--line);border-radius:7px;padding:8px 10px;font-size:12px;margin-bottom:6px;display:flex;align-items:center;gap:8px}
.tmpl .x{margin-left:auto;color:var(--muted-2);cursor:pointer;background:none;border:none}
textarea,.tname{width:100%;background:var(--ink);border:1px solid var(--line);color:var(--paper);border-radius:7px;padding:8px 10px;font-family:'Satoshi';font-size:12px;margin-bottom:8px}
textarea{resize:vertical}
textarea:focus,.mini-row input:focus,.mini-row select:focus,.tname:focus{outline:none;border-color:var(--amber)}
.btn-sm{width:100%;background:var(--amber);color:var(--ink);border:none;border-radius:7px;padding:8px;font-weight:700;font-size:12px;box-shadow:0 6px 16px -8px rgba(255,107,44,.5)}
.btn-sm:hover{background:#ff7f47}
.main-head{display:flex;align-items:center;gap:14px;margin-bottom:18px;flex-wrap:wrap}
.main-head h1{font-weight:900;font-size:23px;letter-spacing:-.03em}
.main-head .meta{font-family:'JetBrains Mono';font-size:11.5px;color:var(--muted-2)}
.search{margin-left:auto;display:flex;align-items:center;gap:8px;background:var(--ink-2);border:1px solid var(--line);border-radius:8px;padding:7px 12px;min-width:210px;transition:border-color .2s}
.search:focus-within{border-color:rgba(255,107,44,.4)}
.search input{background:none;border:none;color:var(--paper);font-size:13px;width:100%;outline:none;font-family:'Satoshi'}
.refresh-btn{background:var(--ink-2);border:1px solid var(--line);color:var(--paper);border-radius:8px;width:36px;height:36px;display:grid;place-items:center;font-size:15px;flex-shrink:0;transition:border-color .2s}
.refresh-btn:hover:not(:disabled){border-color:var(--line-2)}
.refresh-btn:disabled{opacity:.5;cursor:not-allowed}
.refresh-btn.spin span{display:inline-block;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.tabs{display:flex;gap:4px;background:var(--ink-2);border:1px solid var(--line);border-radius:10px;padding:4px;margin-bottom:20px;position:relative}
.tab{flex:1;position:relative;z-index:2;display:flex;align-items:center;justify-content:center;gap:8px;padding:10px 14px;border:none;background:none;color:var(--muted);font-size:13.5px;font-weight:700;border-radius:7px}
.tab .count{font-family:'JetBrains Mono';font-size:10.5px;background:var(--ink);border:1px solid var(--line);padding:1px 7px;border-radius:20px;color:var(--muted)}
.tab.active{color:var(--paper)}
.tab.active .count{background:var(--amber-soft);color:var(--amber);border-color:var(--amber-soft)}
.tab-glider{position:absolute;top:4px;bottom:4px;background:var(--ink-3);border:1px solid var(--line-2);border-radius:7px;transition:transform .32s cubic-bezier(.4,.1,.2,1),width .32s;z-index:1}
.slide{display:none;animation:sf .35s ease both}
.slide.show{display:block}
@keyframes sf{from{opacity:0;transform:translateX(10px)}to{opacity:1;transform:translateX(0)}}
.group-label{font-family:'JetBrains Mono';font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted-2);margin:22px 0 11px;display:flex;align-items:center;gap:10px}
.group-label::after{content:"";flex:1;height:1px;background:var(--line)}
.group-label:first-child{margin-top:0}
.mailrow{position:relative;background:linear-gradient(180deg,rgba(16,16,16,.98),var(--ink-2));border:1px solid var(--line);border-radius:10px;margin-bottom:11px;transition:transform .18s ease,border-color .18s,box-shadow .18s}
.mailrow:hover{transform:translateX(3px);border-color:var(--line-2);box-shadow:-3px 0 0 0 var(--stripe,var(--muted-2)),0 10px 28px -18px rgba(0,0,0,.55)}
.mailrow::before{content:"";position:absolute;left:0;top:10px;bottom:10px;width:3px;border-radius:3px;background:var(--stripe,var(--muted-2))}
.mailrow.high{--stripe:var(--amber)}
.mailrow.normal,.mailrow.med{--stripe:#c9c05a}
.mailrow.low{--stripe:var(--muted-2)}
.mailrow.risk{--stripe:var(--red)}
.mail-head{display:flex;align-items:center;gap:14px;padding:14px 17px 14px 20px;cursor:pointer}
.stamp{width:44px;height:48px;border:1.5px dashed var(--line-2);border-radius:6px;display:flex;flex-direction:column;align-items:center;justify-content:center;flex-shrink:0;background:var(--ink)}
.stamp .mo{font-family:'JetBrains Mono';font-size:9px;color:var(--muted-2);text-transform:uppercase}
.stamp .da{font-family:'JetBrains Mono';font-weight:700;font-size:17px;color:var(--paper);line-height:1}
.mail-main{flex:1;min-width:0}
.mail-l1{display:flex;align-items:center;gap:9px;margin-bottom:3px;flex-wrap:wrap}
.mail-sender{font-size:13.5px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.mail-email{font-family:'JetBrains Mono';font-size:10.5px;color:var(--muted-2)}
.mail-sum{font-size:13px;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.mail-right{display:flex;align-items:center;gap:12px;flex-shrink:0}
.chev{color:var(--muted-2);transition:transform .25s;font-size:12px}
.mailrow.open .chev{transform:rotate(180deg)}
.mail-body{max-height:0;overflow:hidden;transition:max-height .3s ease}
.mailrow.open .mail-body{max-height:480px}
.mail-body-inner{padding:4px 17px 17px 81px}
.bfield{display:flex;gap:12px;margin-bottom:10px;font-size:13px}
.bfield .k{font-family:'JetBrains Mono';font-size:10px;letter-spacing:.06em;text-transform:uppercase;color:var(--muted-2);width:74px;flex-shrink:0;padding-top:2px}
.bfield .v{color:var(--paper);flex:1}
.action-line{background:var(--ink);border:1px solid var(--amber-soft);border-radius:7px;padding:9px 12px;font-size:12.5px;color:var(--amber);margin:11px 0}
.risk-line{background:var(--red-soft);border:1px solid var(--red);border-radius:7px;padding:9px 12px;font-size:12px;color:var(--red);margin:11px 0}
.highlights-row{display:flex;flex-wrap:wrap;gap:6px;margin:11px 0}
.hl-pill{background:var(--teal-soft);color:var(--teal);border:1px solid rgba(57,178,125,.35);border-radius:20px;padding:3px 10px;font-size:11.5px;font-weight:600;white-space:nowrap}
.empty{padding:40px 20px;text-align:center;color:var(--muted);font-size:14px;background:var(--ink-2);border:1px dashed var(--line);border-radius:10px;line-height:1.55}
.tier-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:13px}
@media(max-width:820px){.tier-grid{grid-template-columns:1fr}}
.tier-col{background:var(--ink-2);border:1px solid var(--line);border-radius:var(--radius);overflow:hidden}
.tier-head{padding:12px 15px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:9px;font-weight:700;font-size:13.5px}
.tier-head .dot{width:8px;height:8px;border-radius:50%}
.tier-head.high .dot{background:var(--amber)}
.tier-head.med .dot{background:#c9c05a}
.tier-head.low .dot{background:var(--muted-2)}
.tier-head .cnt{margin-left:auto;font-family:'JetBrains Mono';font-size:10.5px;color:var(--muted-2)}
.tier-body{padding:11px}
.tcard{background:var(--ink);border:1px solid var(--line);border-radius:8px;padding:11px 12px;margin-bottom:8px}
.tcard .tc-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:5px}
.tcard .tc-sender{font-size:12.5px;font-weight:700}
.tcard .tc-date{font-family:'JetBrains Mono';font-size:10px;color:var(--muted-2)}
.tcard .tc-sum{font-size:12px;color:var(--muted);line-height:1.4}
.hidden{display:none}
.modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;display:flex;align-items:center;justify-content:center;padding:20px}
.modal-backdrop.hidden{display:none}
.modal-box{background:var(--ink-2);border:1px solid var(--line-2);border-radius:12px;max-width:900px;width:100%;max-height:80vh;overflow:auto;padding:20px;box-shadow:0 30px 60px -20px rgba(0,0,0,.85)}
.modal-head{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.modal-head h3{font-size:16px;font-weight:800}
.modal-head .x{margin-left:auto;background:none;border:none;color:var(--muted-2);font-size:20px;cursor:pointer}
.modal-head .x:hover{color:var(--paper)}
.dbtable{width:100%;border-collapse:collapse;font-size:12.5px}
.dbtable th,.dbtable td{padding:8px 10px;border-bottom:1px solid var(--line);text-align:left;max-width:220px;overflow:hidden;text-overflow:ellipsis}
.dbtable th{color:var(--muted-2);font-family:'JetBrains Mono';font-size:10.5px;text-transform:uppercase;letter-spacing:.04em;white-space:nowrap}
.dbtable td.del{width:1%}
.dbtable td.del button{background:none;border:none;color:var(--muted-2);cursor:pointer;font-size:14px}
.dbtable td.del button:hover{color:var(--red)}
.db-portal{display:flex;gap:8px;margin:11px 0;align-items:center;flex-wrap:wrap}
.db-portal select{flex:1;min-width:140px;background:var(--ink);border:1px solid var(--line);color:var(--paper);border-radius:7px;padding:7px 9px;font-size:12px;font-family:'Satoshi'}
.db-portal button{background:var(--ink-3);border:1px solid var(--line);color:var(--paper);border-radius:7px;padding:7px 12px;font-size:12px;font-weight:600;white-space:nowrap}
.db-portal button:hover:not(:disabled){border-color:var(--amber)}
.db-portal button:disabled{opacity:.5;cursor:not-allowed}
.db-portal .hint{font-size:11.5px;color:var(--muted-2)}
.reply-box{margin:11px 0;padding:12px;background:var(--ink);border:1px solid var(--line);border-radius:8px}
.reply-controls{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.reply-controls input,.reply-controls select{background:var(--ink-2);border:1px solid var(--line);color:var(--paper);border-radius:7px;padding:7px 9px;font-size:12px;font-family:'Satoshi'}
.reply-controls input{flex:1;min-width:160px}
.reply-controls button{background:var(--ink-3);border:1px solid var(--line);color:var(--paper);border-radius:7px;padding:7px 12px;font-size:12px;font-weight:600;white-space:nowrap}
.reply-controls button:hover:not(:disabled){border-color:var(--amber)}
.reply-controls button:disabled{opacity:.5;cursor:not-allowed}
.reply-draft{margin-top:10px}
.reply-draft textarea{width:100%;background:var(--ink-2);border:1px solid var(--line);color:var(--paper);border-radius:7px;padding:10px;font-family:'Satoshi';font-size:13px;margin-bottom:8px;resize:vertical}
.reply-actions{display:flex;gap:8px}
.reply-actions button{flex:1;padding:9px;border-radius:7px;font-weight:700;font-size:12.5px;border:none}
.reply-actions button:disabled{opacity:.6;cursor:not-allowed}
.reply-actions .send{background:var(--amber);color:var(--ink)}
.reply-actions .send:hover:not(:disabled){background:#ff7f47}
.reply-actions .discard{background:var(--ink-3);border:1px solid var(--line) !important;color:var(--muted)}
.replied-note{background:var(--teal-soft);border:1px solid rgba(57,178,125,.35);border-radius:7px;padding:9px 12px;font-size:12.5px;color:var(--teal);margin:11px 0}
.co-row{display:flex;align-items:center;gap:8px;background:var(--ink);border:1px solid var(--line);border-radius:7px;padding:7px 10px;font-size:12px;margin-bottom:6px;cursor:pointer;transition:border-color .2s}
.co-row:hover{border-color:var(--amber)}
.co-total{color:var(--muted-2);font-size:10.5px;font-family:'JetBrains Mono'}
.co-badge{margin-left:auto;background:var(--amber);color:var(--ink);font-family:'JetBrains Mono';font-size:10px;font-weight:700;padding:1px 7px;border-radius:20px;box-shadow:0 0 8px rgba(255,107,44,.55)}
.assistant{position:fixed;left:20px;bottom:20px;z-index:90;display:flex;flex-direction:column;align-items:flex-start;gap:12px}
.assistant-fab{width:52px;height:52px;border-radius:50%;background:var(--amber);color:var(--ink);border:none;font-size:22px;display:grid;place-items:center;cursor:pointer;box-shadow:0 10px 28px -8px rgba(255,107,44,.6);transition:transform .15s}
.assistant-fab:hover{transform:scale(1.06)}
.assistant-panel{width:340px;max-width:calc(100vw - 40px);background:var(--ink-2);border:1px solid var(--line-2);border-radius:12px;box-shadow:0 24px 60px -20px rgba(0,0,0,.85);display:flex;flex-direction:column;overflow:hidden}
.assistant-head{display:flex;align-items:center;padding:11px 14px;border-bottom:1px solid var(--line);font-weight:700;font-size:13px}
.assistant-head .x{margin-left:auto;background:none;border:none;color:var(--muted-2);font-size:18px;cursor:pointer}
.assistant-head .x:hover{color:var(--paper)}
.assistant-log{max-height:280px;overflow-y:auto;padding:12px 14px;display:flex;flex-direction:column;gap:8px}
.assistant-log:empty::before{content:"Try: “refresh my inbox”, “show me by category”, “add a rule for invoice as high priority”…";color:var(--muted-2);font-size:12px;line-height:1.5}
.assistant-msg{font-size:12.5px;line-height:1.5;padding:8px 11px;border-radius:9px;max-width:92%}
.assistant-msg.user{align-self:flex-end;background:var(--amber-soft);color:var(--amber)}
.assistant-msg.ai{align-self:flex-start;background:var(--ink);border:1px solid var(--line);color:var(--paper)}
.assistant-msg.thinking{color:var(--muted-2);font-style:italic}
.assistant-input-row{display:flex;gap:8px;padding:11px;border-top:1px solid var(--line)}
.assistant-input-row input{flex:1;background:var(--ink);border:1px solid var(--line);color:var(--paper);border-radius:8px;padding:9px 11px;font-size:12.5px;font-family:'Satoshi'}
.assistant-input-row button{background:var(--amber);color:var(--ink);border:none;border-radius:8px;width:36px;font-size:15px;font-weight:700;cursor:pointer}
.assistant-input-row button:disabled{opacity:.5;cursor:not-allowed}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-inner">
    <div class="brand"><span class="logo"><img src="assets/xmail-logo.jpeg?v=4" alt="XMAIL" width="40" height="40"></span>XMAIL</div>
    <div class="top-right">
      <div class="conn off" id="conn-tg"><span class="dot"></span><span class="label">Telegram</span></div>
      <div class="conn off" id="conn-wa"><span class="dot"></span><span class="label">WhatsApp</span></div>
      <div class="acct">
        <button class="acct-btn" type="button" onclick="document.getElementById('acctMenu').classList.toggle('open')">
          <span class="avatar" id="avatar">?</span>
          <span class="mono" style="font-size:12px" id="userEmail">…</span>
          <span style="color:var(--muted-2);font-size:10px">▾</span>
        </button>
        <div class="acct-menu" id="acctMenu">
          <div class="acct-head">
            <div class="em mono" id="menuEmail">—</div>
            <div class="sub" id="menuSub">Loading…</div>
          </div>
          <a href="setup.html">⚙️ Setup / connect channels</a>
          <a href="app.html">🧰 Classic control panel</a>
          <button type="button" onclick="logout()" style="color:var(--red)">↳ Sign out</button>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="shell">
  <div class="sidebar">
    <div class="bar open">
      <div class="bar-head" onclick="this.parentElement.classList.toggle('open')"><span class="bic">📊</span><h4>Priorities</h4><span class="cnt" id="prCount">0</span><span class="chev-b">▾</span></div>
      <div class="bar-body"><div class="bar-body-inner">
        <div class="mini-row">
          <select id="pType"><option value="keyword">Keyword</option><option value="sender">Sender</option><option value="domain">Domain</option></select>
          <select id="pLevel"><option value="high">High</option><option value="low">Low</option></select>
        </div>
        <div class="mini-row">
          <input id="pValue" placeholder="value e.g. invoice">
          <button class="mini-add" type="button" onclick="addPriority()">+</button>
        </div>
        <div id="prList"></div>
      </div></div>
    </div>
    <div class="bar">
      <div class="bar-head" onclick="this.parentElement.classList.toggle('open')"><span class="bic">🗂️</span><h4>Categories</h4><span class="cnt" id="catCount">0</span><span class="chev-b">▾</span></div>
      <div class="bar-body"><div class="bar-body-inner">
        <div class="mini-row">
          <input id="catValue" placeholder="e.g. Legal" style="flex:1">
          <button class="mini-add" type="button" onclick="addCategoryUI()">+</button>
        </div>
        <div id="catList"></div>
      </div></div>
    </div>
    <div class="bar">
      <div class="bar-head" onclick="this.parentElement.classList.toggle('open')"><span class="bic">🏢</span><h4>Company</h4><span class="cnt" id="coCount">0</span><span class="chev-b">▾</span></div>
      <div class="bar-body"><div class="bar-body-inner">
        <div id="coList"></div>
      </div></div>
    </div>
    <div class="bar">
      <div class="bar-head" onclick="this.parentElement.classList.toggle('open')"><span class="bic">🗃️</span><h4>Database</h4><span class="cnt" id="dbCount">0</span><span class="chev-b">▾</span></div>
      <div class="bar-body"><div class="bar-body-inner">
        <input id="dbName" class="tname" placeholder="Folder name, e.g. Invoices">
        <input id="dbFields" class="tname" placeholder="Fields, comma separated — Sender, Amount, Due date">
        <button class="btn-sm" type="button" onclick="createDbTable()">Create folder</button>
        <div id="dbList" style="margin-top:10px"></div>
      </div></div>
    </div>
    <div class="bar">
      <div class="bar-head" onclick="this.parentElement.classList.toggle('open')"><span class="bic">📄</span><h4>Templates</h4><span class="cnt" id="tmCount">0</span><span class="chev-b">▾</span></div>
      <div class="bar-body"><div class="bar-body-inner">
        <input id="tName" class="tname mono" placeholder="Template name">
        <textarea id="tBody" rows="2" placeholder="Hi [name], regarding…"></textarea>
        <button class="btn-sm" type="button" onclick="addTemplate()">Save template</button>
        <div id="tmList" style="margin-top:10px"></div>
      </div></div>
    </div>
  </div>

  <div class="main">
    <div class="main-head">
      <h1 id="viewTitle">Inbox</h1>
      <span class="meta" id="viewMeta">Loading…</span>
      <div class="search">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4-4"/></svg>
        <input id="search" placeholder="Search email…" oninput="renderEmails()">
      </div>
      <button class="refresh-btn" id="refreshBtn" type="button" onclick="refreshInbox()" title="Check inbox now"><span id="refreshIcon">🔄</span></button>
    </div>

    <div class="tabs" id="tabs">
      <button class="tab active" data-slide="0" type="button"><span class="ic">📨</span>Emails <span class="count" id="cntEmails">0</span></button>
      <button class="tab" data-slide="1" type="button"><span class="ic">🗂️</span>Category <span class="count" id="cntCategories">0</span></button>
      <button class="tab" data-slide="2" type="button"><span class="ic">📊</span>Tier <span class="count" id="cntTiers">3</span></button>
      <div class="tab-glider" id="glider"></div>
    </div>

    <div class="slides">
      <div class="slide show" id="slide-0"></div>
      <div class="slide" id="slide-1"></div>
      <div class="slide" id="slide-2"></div>
    </div>
  </div>
</div>

<div class="modal-backdrop hidden" id="dbModal" onclick="if(event.target===this) closeDbModal()">
  <div class="modal-box">
    <div class="modal-head">
      <h3 id="dbModalTitle">Folder</h3>
      <button class="x" type="button" onclick="closeDbModal()">×</button>
    </div>
    <div id="dbModalBody"></div>
  </div>
</div>

<div class="assistant" id="assistant">
  <div class="assistant-panel hidden" id="assistantPanel">
    <div class="assistant-head">Ask XMAIL <button class="x" type="button" onclick="toggleAssistant()">×</button></div>
    <div class="assistant-log" id="assistantLog"></div>
    <div class="assistant-input-row">
      <input id="assistantInput" placeholder="e.g. 'show me Bybit emails' or 'add a category called Legal'" onkeydown="if(event.key==='Enter') sendAssistantCommand()">
      <button type="button" id="assistantSend" onclick="sendAssistantCommand()">➤</button>
    </div>
  </div>
  <button class="assistant-fab" id="assistantFab" onclick="toggleAssistant()" title="Ask XMAIL">💬</button>
</div>

<script>
const $ = (id) => document.getElementById(id);
let emails = [];
let categories = [];
let dbTables = [];
let templates = [];
let me = null;

async function api(path, opts = {}) {
  const res = await fetch('/api' + path, {
    headers: { 'content-type': 'application/json' },
    credentials: 'same-origin',
    ...opts,
    body: opts.body ? JSON.stringify(opts.body) : undefined,
  });
  const data = await res.json().catch(() => ({}));
  if (!res.ok) throw new Error(data.error || ('Request failed: ' + res.status));
  return data;
}

function escapeHtml(s) {
  const d = document.createElement('div');
  d.textContent = s || '';
  return d.innerHTML;
}

function toggle(row) { row.classList.toggle('open'); }

function monthDay(iso) {
  if (!iso) return { mo: '—', da: '—' };
  const d = new Date(iso);
  if (Number.isNaN(d.getTime())) return { mo: '—', da: '—' };
  return {
    mo: d.toLocaleString('en', { month: 'short' }),
    da: String(d.getDate()).padStart(2, '0'),
  };
}

function senderName(from) {
  if (!from) return 'Unknown';
  const m = String(from).match(/^"?([^"<]+)"?\s*</);
  return (m ? m[1] : from).trim().slice(0, 40) || 'Unknown';
}

function priClass(p) {
  p = (p || 'normal').toLowerCase();
  if (p === 'high') return 'high';
  if (p === 'low') return 'low';
  return 'normal';
}

async function logout() {
  try { await api('/logout', { method: 'POST' }); } catch {}
  location.href = 'setup.html';
}

async function boot() {
  try {
    me = await api('/me');
  } catch {
    location.href = 'setup.html';
    return;
  }

  $('userEmail').textContent = me.email;
  $('menuEmail').textContent = me.email;
  $('avatar').textContent = (me.email || '?')[0].toUpperCase();
  $('menuSub').textContent = me.inboxConnected
    ? ('Inbox connected · ' + (me.inboxUser || ''))
    : 'Inbox not connected';

  $('conn-tg').className = 'conn ' + (me.telegramLinked ? 'on' : 'off');
  $('conn-wa').className = 'conn ' + (me.whatsappNumber ? 'on' : 'off');

  await Promise.all([loadRules(), loadTemplates(), loadCategories(), loadDbTables(), loadEmails()]);
}

async function loadRules() {
  const rules = await api('/rules');
  const list = $('prList');
  list.innerHTML = '';
  $('prCount').textContent = rules.length;
  for (const r of rules) {
    const chip = document.createElement('div');
    chip.className = 'chip';
    chip.innerHTML = `<span class="pill ${r.level}">${r.level}</span>${escapeHtml(r.value)}`;
    const x = document.createElement('button');
    x.className = 'x'; x.type = 'button'; x.textContent = '×';
    x.onclick = async () => {
      if (!confirm(`Delete the "${r.value}" rule?`)) return;
      await api('/rules/' + r.id, { method: 'DELETE' }); loadRules();
    };
    chip.appendChild(x);
    list.appendChild(chip);
  }
}

async function addPriority() {
  const value = $('pValue').value.trim();
  if (!value) return;
  try {
    await api('/rules', {
      method: 'POST',
      body: { type: $('pType').value, value, level: $('pLevel').value },
    });
    $('pValue').value = '';
    loadRules();
  } catch (e) { alert(e.message); }
}

async function loadTemplates() {
  templates = await api('/templates');
  const list = $('tmList');
  list.innerHTML = '';
  $('tmCount').textContent = templates.length;
  for (const x of templates) {
    const row = document.createElement('div');
    row.className = 'tmpl';
    row.innerHTML = `📄 ${escapeHtml(x.name)}`;
    const del = document.createElement('button');
    del.className = 'x'; del.type = 'button'; del.textContent = '×';
    del.onclick = async () => {
      if (!confirm(`Delete the "${x.name}" template?`)) return;
      await api('/templates/' + x.id, { method: 'DELETE' }); loadTemplates();
    };
    row.appendChild(del);
    list.appendChild(row);
  }
  renderEmails();
}

async function addTemplate() {
  try {
    await api('/templates', {
      method: 'POST',
      body: { name: $('tName').value, content: $('tBody').value },
    });
    $('tName').value = '';
    $('tBody').value = '';
    loadTemplates();
  } catch (e) { alert(e.message); }
}

async function loadCategories() {
  categories = await api('/categories');
  const list = $('catList');
  list.innerHTML = '';
  $('catCount').textContent = categories.length;
  $('cntCategories').textContent = categories.length;
  for (const c of categories) {
    const chip = document.createElement('div');
    chip.className = 'chip';
    chip.innerHTML = escapeHtml(c.name);
    const x = document.createElement('button');
    x.className = 'x'; x.type = 'button'; x.textContent = '×';
    x.onclick = async () => {
      if (!confirm(`Delete the "${c.name}" category?`)) return;
      try { await api('/categories/' + c.id, { method: 'DELETE' }); loadCategories(); renderEmails(); }
      catch (e) { alert(e.message); }
    };
    chip.appendChild(x);
    list.appendChild(chip);
  }
  renderEmails();
}

async function addCategoryUI() {
  const name = $('catValue').value.trim();
  if (!name) return;
  try {
    await api('/categories', { method: 'POST', body: { name } });
    $('catValue').value = '';
    loadCategories();
  } catch (e) { alert(e.message); }
}

/* ---------- custom database folders ---------- */
async function loadDbTables() {
  dbTables = await api('/dbtables');
  const list = $('dbList');
  list.innerHTML = '';
  $('dbCount').textContent = dbTables.length;
  if (!dbTables.length) {
    list.innerHTML = '<div class="mini-note" style="font-size:11.5px;color:var(--muted-2)">No folders yet — name one above and list the fields to store.</div>';
  }
  for (const t of dbTables) {
    const row = document.createElement('div');
    row.className = 'tmpl';
    row.style.cursor = 'pointer';
    row.innerHTML = `🗃️ ${escapeHtml(t.name)} <span class="mono" style="color:var(--muted-2);font-size:10.5px">(${t.rowCount})</span>`;
    row.onclick = () => openDbTable(t.id);
    const del = document.createElement('button');
    del.className = 'x'; del.type = 'button'; del.textContent = '×';
    del.onclick = async (ev) => {
      ev.stopPropagation();
      if (!confirm(`Delete the "${t.name}" folder? This also deletes all ${t.rowCount} saved row${t.rowCount === 1 ? '' : 's'} in it — this can't be undone.`)) return;
      await api('/dbtables/' + t.id, { method: 'DELETE' });
      loadDbTables();
    };
    row.appendChild(del);
    list.appendChild(row);
  }
  renderEmails();
}

async function createDbTable() {
  const name = $('dbName').value.trim();
  const fields = $('dbFields').value.split(',').map(f => f.trim()).filter(Boolean);
  if (!name) { alert('Give the folder a name.'); return; }
  if (!fields.length) { alert('List at least one field to store, e.g. Sender, Amount, Due date.'); return; }
  try {
    await api('/dbtables', { method: 'POST', body: { name, fields } });
    $('dbName').value = '';
    $('dbFields').value = '';
    loadDbTables();
  } catch (e) { alert(e.message); }
}

async function openDbTable(id) {
  try {
    const { table, rows } = await api('/dbtables/' + id + '/rows');
    $('dbModalTitle').textContent = table.name;
    const cols = table.fields;
    let html = `<div style="overflow-x:auto"><table class="dbtable"><thead><tr>${cols.map(c => `<th>${escapeHtml(c)}</th>`).join('')}<th>Added</th><th></th></tr></thead><tbody>`;
    if (!rows.length) {
      html += `<tr><td colspan="${cols.length + 2}" class="empty" style="border:none">No rows yet — open an email and use "Add to database" to fill this in.</td></tr>`;
    } else {
      for (const r of rows) {
        const d = new Date(r.createdAt);
        html += '<tr>' + cols.map(c => `<td>${escapeHtml(r.values[c] || '—')}</td>`).join('') +
          `<td class="mono" style="color:var(--muted-2)">${d.toLocaleDateString()}</td>` +
          `<td class="del"><button type="button" onclick="deleteDbRow(${id},${r.id})">×</button></td></tr>`;
      }
    }
    html += '</tbody></table></div>';
    $('dbModalBody').innerHTML = html;
    $('dbModal').classList.remove('hidden');
  } catch (e) { alert(e.message); }
}

async function deleteDbRow(tableId, rowId) {
  if (!confirm('Delete this row? This can\'t be undone.')) return;
  await api('/dbtables/' + tableId + '/rows/' + rowId, { method: 'DELETE' });
  openDbTable(tableId);
  loadDbTables();
}

function closeDbModal() {
  $('dbModal').classList.add('hidden');
}

async function extractToDb(emailId, btn) {
  const select = btn.previousElementSibling;
  const tableId = select.value;
  if (!tableId) return;
  btn.disabled = true;
  const original = btn.textContent;
  btn.textContent = 'Extracting…';
  try {
    await api('/emails/' + emailId + '/extract', { method: 'POST', body: { tableId: Number(tableId) } });
    btn.textContent = '✓ Added';
    loadDbTables();
    setTimeout(() => { btn.textContent = original; btn.disabled = false; }, 1800);
  } catch (e) {
    alert(e.message);
    btn.textContent = original;
    btn.disabled = false;
  }
}

/* ---------- reply portal: draft, fill template, send for real ---------- */
async function generateDraft(emailId, btn) {
  const instr = $('instr-' + emailId).value.trim();
  if (!instr) { alert("Tell me what you want the reply to say."); return; }
  btn.disabled = true;
  const original = btn.textContent;
  btn.textContent = 'Drafting…';
  try {
    const { draft } = await api('/emails/' + emailId + '/draft', { method: 'POST', body: { instruction: instr } });
    $('draftText-' + emailId).value = draft;
    $('draftWrap-' + emailId).classList.remove('hidden');
  } catch (e) { alert(e.message); }
  btn.disabled = false;
  btn.textContent = original;
}

async function useTemplateForReply(emailId, btn) {
  const sel = $('tplsel-' + emailId);
  const templateId = sel.value;
  if (!templateId) { alert('Pick a template first.'); return; }
  btn.disabled = true;
  const original = btn.textContent;
  btn.textContent = 'Filling…';
  try {
    const { draft } = await api('/emails/' + emailId + '/fill-template', { method: 'POST', body: { templateId: Number(templateId) } });
    $('draftText-' + emailId).value = draft;
    $('draftWrap-' + emailId).classList.remove('hidden');
  } catch (e) { alert(e.message); }
  btn.disabled = false;
  btn.textContent = original;
}

function discardDraft(emailId) {
  $('draftWrap-' + emailId).classList.add('hidden');
}

async function sendReply(emailId, btn) {
  const text = $('draftText-' + emailId).value.trim();
  if (!text) { alert('Draft is empty.'); return; }
  if (!confirm('Send this reply now? This sends a real email from your connected inbox.')) return;
  btn.disabled = true;
  const original = btn.textContent;
  btn.textContent = 'Sending…';
  try {
    await api('/emails/' + emailId + '/send', { method: 'POST', body: { body: text } });
    btn.textContent = '✓ Sent';
    setTimeout(() => loadEmails(), 700);
  } catch (e) {
    alert(e.message);
    btn.disabled = false;
    btn.textContent = original;
  }
}

async function loadEmails() {
  emails = await api('/emails');
  renderEmails();
}

async function refreshInbox() {
  const btn = $('refreshBtn');
  btn.disabled = true;
  btn.classList.add('spin');
  try {
    const r = await api('/emails/refresh', { method: 'POST' });
    await loadEmails();
    if (r.new) {
      const meta = $('viewMeta');
      const restore = meta.textContent;
      meta.textContent = `✓ ${r.new} new email${r.new === 1 ? '' : 's'}`;
      setTimeout(() => { meta.textContent = restore; }, 2500);
    }
  } catch (e) {
    alert(e.message);
  }
  btn.disabled = false;
  btn.classList.remove('spin');
}

function filteredEmails() {
  const q = ($('search').value || '').toLowerCase().trim();
  if (!q) return emails;
  return emails.filter(e =>
    (e.subject || '').toLowerCase().includes(q) ||
    (e.from || '').toLowerCase().includes(q) ||
    (e.summary || '').toLowerCase().includes(q)
  );
}

function renderEmails() {
  const list = filteredEmails();
  $('cntEmails').textContent = list.length;
  $('viewMeta').textContent = list.length + ' email' + (list.length === 1 ? '' : 's');

  const slide0 = $('slide-0');
  if (!list.length) {
    slide0.innerHTML = '<div class="empty">Nothing processed yet — send a test email to your connected inbox, or finish setup.</div>';
  } else {
    slide0.innerHTML = list.map(e => {
      const { mo, da } = monthDay(e.receivedAt || e.received_at);
      const pri = priClass(e.priority);
      const risk = e.scamRisk || e.scam_risk;
      const riskHtml = risk
        ? `<div class="risk-line">⚠️ Possible scam · risk ${Math.round(Number(risk) * (Number(risk) <= 1 ? 100 : 1))}%${e.scamReasons || e.scam_reasons ? ' — ' + escapeHtml(e.scamReasons || e.scam_reasons) : ''}</div>`
        : '';
      const action = e.action ? `<div class="action-line">➡️ ${escapeHtml(e.action)}</div>` : '';
      const highlights = e.highlights?.length
        ? `<div class="highlights-row">${e.highlights.map(h => `<span class="hl-pill">📌 ${escapeHtml(h)}</span>`).join('')}</div>`
        : '';
      const dbPortal = dbTables.length
        ? `<div class="db-portal" onclick="event.stopPropagation()">
             <select>${dbTables.map(t => `<option value="${t.id}">${escapeHtml(t.name)}</option>`).join('')}</select>
             <button type="button" onclick="extractToDb('${e.id}', this)">＋ Add to database</button>
           </div>`
        : `<div class="db-portal hint" onclick="event.stopPropagation()">Create a database folder in the sidebar to save this email's data.</div>`;
      const sentReply = e.sentReply || e.sent_reply;
      const replyBox = sentReply
        ? `<div class="replied-note">✅ Replied: ${escapeHtml(sentReply.slice(0, 200))}${sentReply.length > 200 ? '…' : ''}</div>`
        : `<div class="reply-box" onclick="event.stopPropagation()">
             <div class="reply-controls">
               <input id="instr-${e.id}" placeholder="Tone/instructions — e.g. 'polite but firm, payment by Friday'">
               <button type="button" onclick="generateDraft('${e.id}', this)">✍️ Draft reply</button>
               ${templates.length ? `<select id="tplsel-${e.id}"><option value="">Use a template…</option>${templates.map(t => `<option value="${t.id}">${escapeHtml(t.name)}</option>`).join('')}</select><button type="button" onclick="useTemplateForReply('${e.id}', this)">📋 Fill</button>` : ''}
             </div>
             <div class="reply-draft hidden" id="draftWrap-${e.id}">
               <textarea id="draftText-${e.id}" rows="5"></textarea>
               <div class="reply-actions">
                 <button class="send" type="button" onclick="sendReply('${e.id}', this)">✅ Send reply</button>
                 <button class="discard" type="button" onclick="discardDraft('${e.id}')">✕ Discard</button>
               </div>
             </div>
           </div>`;
      return `<div class="mailrow ${pri}${risk ? ' risk' : ''}" onclick="toggle(this)">
        <div class="mail-head">
          <div class="stamp"><span class="mo">${mo}</span><span class="da">${da}</span></div>
          <div class="mail-main">
            <div class="mail-l1"><span class="pill ${pri}">${pri}</span><span class="mail-sender">${escapeHtml(senderName(e.from))}</span><span class="mail-email mono">${escapeHtml(e.from || '')}</span></div>
            <div class="mail-sum">${escapeHtml(e.summary || e.subject || '')}</div>
          </div>
          <div class="mail-right"><span class="mono" style="font-size:10px;color:var(--muted-2)">${escapeHtml(e.status || '')}</span><span class="chev">▾</span></div>
        </div>
        <div class="mail-body"><div class="mail-body-inner">
          <div class="bfield"><span class="k">From</span><span class="v mono">${escapeHtml(e.from || '')}</span></div>
          <div class="bfield"><span class="k">Subject</span><span class="v">${escapeHtml(e.subject || '')}</span></div>
          <div class="bfield"><span class="k">Summary</span><span class="v">${escapeHtml(e.summary || '—')}</span></div>
          ${highlights}${action}${riskHtml}${replyBox}${dbPortal}
        </div></div>
      </div>`;
    }).join('');
  }

  const high = list.filter(e => priClass(e.priority) === 'high');
  const low = list.filter(e => priClass(e.priority) === 'low');
  const mid = list.filter(e => priClass(e.priority) === 'normal');
  const card = (e) => {
    const { mo, da } = monthDay(e.receivedAt || e.received_at);
    return `<div class="tcard"><div class="tc-top"><span class="tc-sender">${escapeHtml(senderName(e.from))}</span><span class="tc-date">${mo} ${da}</span></div><div class="tc-sum">${escapeHtml(e.summary || e.subject || '')}</div></div>`;
  };
  $('slide-2').innerHTML = `<div class="tier-grid">
    <div class="tier-col"><div class="tier-head high"><span class="dot"></span>High tier<span class="cnt">${high.length}</span></div><div class="tier-body">${high.map(card).join('') || '<div class="empty">None</div>'}</div></div>
    <div class="tier-col"><div class="tier-head med"><span class="dot"></span>Normal<span class="cnt">${mid.length}</span></div><div class="tier-body">${mid.map(card).join('') || '<div class="empty">None</div>'}</div></div>
    <div class="tier-col"><div class="tier-head low"><span class="dot"></span>Low tier<span class="cnt">${low.length}</span></div><div class="tier-body">${low.map(card).join('') || '<div class="empty">None</div>'}</div></div>
  </div>`;

  // by category — one column per managed category, plus an Uncategorized bucket for older/unmatched mail
  const byCat = new Map(categories.map(c => [c.name, []]));
  const uncategorized = [];
  for (const e of list) {
    if (e.category && byCat.has(e.category)) byCat.get(e.category).push(e);
    else uncategorized.push(e);
  }
  const catCols = categories.map(c =>
    `<div class="tier-col"><div class="tier-head"><span class="dot" style="background:var(--amber)"></span>${escapeHtml(c.name)}<span class="cnt">${byCat.get(c.name).length}</span></div><div class="tier-body">${byCat.get(c.name).map(card).join('') || '<div class="empty">None</div>'}</div></div>`
  );
  if (uncategorized.length) {
    catCols.push(`<div class="tier-col"><div class="tier-head"><span class="dot" style="background:var(--muted-2)"></span>Uncategorized<span class="cnt">${uncategorized.length}</span></div><div class="tier-body">${uncategorized.map(card).join('')}</div></div>`);
  }
  $('slide-1').innerHTML = `<div class="tier-grid">${catCols.join('')}</div>`;

  renderCompanies();
}

/* ---------- company grouping (auto-derived from sender's root domain) ---------- */
const TWO_PART_TLDS = new Set(['co.uk','org.uk','com.ng','co.ng','org.ng','com.au','co.za','co.in','com.br']);
function rootDomain(host) {
  const parts = host.split('.');
  if (parts.length <= 2) return host;
  const lastTwo = parts.slice(-2).join('.');
  const lastThree = parts.slice(-3).join('.');
  if (TWO_PART_TLDS.has(lastTwo)) return lastThree;
  return lastTwo;
}
function companyKey(e) {
  const addr = (e.fromAddr || '').toLowerCase();
  const m = addr.match(/@([^>\s]+)$/);
  if (m) return rootDomain(m[1]);
  return (e.from || 'unknown').toLowerCase();
}
function companyName(domain) {
  const base = domain.split('.')[0];
  return base.charAt(0).toUpperCase() + base.slice(1);
}
function renderCompanies() {
  const groups = new Map();
  for (const e of emails) {
    const key = companyKey(e);
    if (!groups.has(key)) groups.set(key, { domain: key, total: 0, unseen: 0, latest: 0 });
    const g = groups.get(key);
    g.total++;
    if ((e.status || 'new') === 'new') g.unseen++;
    const ts = e.receivedAt || e.received_at || 0;
    if (ts > g.latest) g.latest = ts;
  }
  const list = [...groups.values()].sort((a, b) => b.latest - a.latest);
  $('coCount').textContent = list.length;
  const el = $('coList');
  el.innerHTML = '';
  if (!list.length) {
    el.innerHTML = '<div style="font-size:11.5px;color:var(--muted-2)">Companies you hear from will show up here automatically.</div>';
    return;
  }
  for (const g of list) {
    const row = document.createElement('div');
    row.className = 'co-row';
    row.innerHTML = `🏢 ${escapeHtml(companyName(g.domain))} <span class="co-total">(${g.total})</span>` +
      (g.unseen > 0 ? `<span class="co-badge">${g.unseen}</span>` : '');
    row.onclick = () => filterByCompany(g.domain);
    el.appendChild(row);
  }
}
function filterByCompany(domain) {
  $('search').value = domain;
  renderEmails();
  const emailsTab = document.querySelector('.tab[data-slide="0"]');
  if (emailsTab) selectTab(emailsTab);
}

/* tabs */
const tabs = document.querySelectorAll('.tab');
const glider = $('glider');
function moveGlider(el) {
  glider.style.width = el.offsetWidth + 'px';
  glider.style.transform = 'translateX(' + el.offsetLeft + 'px)';
}
function selectTab(el) {
  tabs.forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  moveGlider(el);
  const idx = +el.dataset.slide;
  document.querySelectorAll('.slide').forEach((s, i) => s.classList.toggle('show', i === idx));
  $('viewTitle').textContent = ['Inbox', 'By category', 'By tier'][idx];
}
tabs.forEach(t => t.addEventListener('click', () => selectTab(t)));
window.addEventListener('load', () => moveGlider(document.querySelector('.tab.active')));
window.addEventListener('resize', () => moveGlider(document.querySelector('.tab.active')));
document.addEventListener('click', e => {
  const a = document.querySelector('.acct');
  if (a && !a.contains(e.target)) $('acctMenu').classList.remove('open');
});

/* ---------- AI dashboard assistant (text-based, bottom-left) ---------- */
function toggleAssistant() {
  const panel = $('assistantPanel');
  panel.classList.toggle('hidden');
  if (!panel.classList.contains('hidden')) $('assistantInput').focus();
}

function addAssistantMsg(text, cls) {
  const log = $('assistantLog');
  const div = document.createElement('div');
  div.className = 'assistant-msg ' + cls;
  div.textContent = text;
  log.appendChild(div);
  log.scrollTop = log.scrollHeight;
  return div;
}

async function sendAssistantCommand() {
  const input = $('assistantInput');
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  addAssistantMsg(text, 'user');
  const thinking = addAssistantMsg('Thinking…', 'ai thinking');
  $('assistantSend').disabled = true;
  try {
    const result = await api('/assistant', { method: 'POST', body: { text } });
    thinking.textContent = result.message || 'Done.';
    thinking.classList.remove('thinking');
    await applyAssistantAction(result);
  } catch (e) {
    thinking.textContent = e.message;
    thinking.classList.remove('thinking');
  }
  $('assistantSend').disabled = false;
}

async function applyAssistantAction(result) {
  switch (result.action) {
    case 'view_emails':
      selectTab(document.querySelector('.tab[data-slide="0"]'));
      break;
    case 'view_category':
      selectTab(document.querySelector('.tab[data-slide="1"]'));
      break;
    case 'view_tier':
      selectTab(document.querySelector('.tab[data-slide="2"]'));
      break;
    case 'search':
      $('search').value = result.query || '';
      selectTab(document.querySelector('.tab[data-slide="0"]'));
      renderEmails();
      break;
    case 'refresh_inbox':
      await refreshInbox();
      break;
    case 'add_rule':
      await loadRules();
      break;
    case 'add_category':
      await loadCategories();
      break;
    case 'create_folder':
      await loadDbTables();
      break;
    case 'add_template':
      await loadTemplates();
      break;
    default:
      break; // unknown — the message already asked for clarification
  }
}

boot();
setInterval(() => { if (me) loadEmails().catch(() => {}); }, 60000);
</script>
