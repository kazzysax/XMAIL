<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 160" role="img" aria-label="XMAIL">
  <defs>
    <linearGradient id="xBarA" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFC46A"/>
      <stop offset="45%" stop-color="#FF8A2E"/>
      <stop offset="100%" stop-color="#E85A1B"/>
    </linearGradient>
    <linearGradient id="xBarB" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFB14A"/>
      <stop offset="50%" stop-color="#F07A22"/>
      <stop offset="100%" stop-color="#C94A12"/>
    </linearGradient>
    <linearGradient id="envGrad" x1="0%" y1="0%" x2="0%" y2="100%">
